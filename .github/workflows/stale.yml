name: Close stale PRs

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-pr-stale: 23
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has had no activity for 23 days and will be closed in 7 days
            if nothing further happens. Comment or push to keep it open.
          close-pr-message: >
            Closing this PR after ~30 days of inactivity. Feel free to reopen it.
          exempt-pr-labels: "no-stale,security,pinned,dependencies"
          days-before-issue-stale: -1
          days-before-issue-close: -1
